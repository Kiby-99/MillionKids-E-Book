<script>

window.onload=function(){

const logo=
document.getElementById("ebookLogo");

logo.innerHTML="";

const text="E-BOOK";

let i=0;

function addLetter(){

if(i<text.length){

let s=
document.createElement("span");

s.className="netLetter";

s.style.animationDelay=
(i*0.045)+"s";

s.innerText=text[i];

logo.appendChild(s);

i++;

setTimeout(addLetter,45);

}else{

setTimeout(()=>{

document.getElementById("mainSite")
.style.opacity="1";

document.getElementById("intro")
.style.transition=
"1s";

document.getElementById("intro")
.style.opacity="0";

setTimeout(()=>{

document.getElementById("intro")
.remove();

},1000)

},1200)

}

}

}
